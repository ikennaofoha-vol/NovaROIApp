<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltera ROI Visualizer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            400: '#60a5fa',
                            500: '#3b82f6', // Voltera Primary Action Blue
                            600: '#2563eb',
                            900: '#1e3a8a',
                        },
                        status: {
                            success: '#10b981', // Voltera Green
                            warning: '#FFB700', // Voltera Yellow
                            danger: '#FF3033',  // Voltera Red
                        },
                        surface: {
                            base: '#121418', // Rich Black baseline
                            panel: '#1A1D24', // Elevated card
                            raised: '#232730' // Hover/Highlight state
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Font Awesome (Voltera Standard) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-surface-base bg-carbon text-slate-200 antialiased min-h-screen selection:bg-primary-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- DEFAULTS (Fallback if Google Sheet API fails or is empty) ---
        const DEFAULT_CONFIG = {
            App_Title: "Voltera Print vs. Outsource ROI",
            App_Subtitle: "Discover your break-even point and time-to-market advantage.",
            Tab1_Name: "1. Inputs & Assumptions",
            Tab2_Name: "2. ROI Visualizer",
            Feature_Speed: "Added Revenue from Early Launch",
            Feature_Payback: "Time-Based Payback Period",
            Feature_Space: "Hidden Facility Costs",
            Cat_Global_Title: "Global Parameters",
            Cat_Outsourced_Title: "Outsourced Parameters",
            Cat_InHouse_Title: "In-House Parameters",
            Cat_NOVA_Title: "NOVA Parameters",
            Cat_Global_Icon: "fa-globe",
            Cat_Outsourced_Icon: "fa-truck-fast",
            Cat_InHouse_Icon: "fa-industry",
            Cat_NOVA_Icon: "fa-microchip"
        };

        const DEFAULT_INPUTS = [
            { category: "Global", variable: "labor_rate", display: "Hourly Labor Cost", value: 50, unit: "$/hr", tooltip: "Median hourly rate for engineers." },
            { category: "Global", variable: "iterations_per_cycle", display: "Iterations per Design Cycle", value: 10, unit: "iterations", tooltip: "Number of revisions per final product." },
            { category: "Global", variable: "cycles_per_year", display: "Average Design Cycles per Year", value: 4, unit: "cycles", tooltip: "Used to calculate time-based payback." },
            { category: "Global", variable: "expected_revenue", display: "Expected Monthly Revenue", value: 50000, unit: "$/mo", tooltip: "Revenue expected once the product launches." },
            { category: "Outsourced", variable: "out_lead_time", display: "Lead Time per Iteration", value: 2, unit: "weeks", tooltip: "Average time to receive outsourced boards." },
            { category: "Outsourced", variable: "out_tooling", display: "Setup / Tooling per Iteration", value: 150, unit: "$", tooltip: "NRE, setup, and file prep costs." },
            { category: "Outsourced", variable: "out_material", display: "Material Cost per Print", value: 35, unit: "$", tooltip: "Ink, dielectric, and substrate stack." },
            { category: "InHouse", variable: "in_space", display: "Required Floor Space", value: 100, unit: "sq ft", tooltip: "Space for screen printer, wash station, oven." },
            { category: "InHouse", variable: "in_space_cost", display: "Cost per Sq Ft", value: 25, unit: "$/sq ft", tooltip: "Average industrial/commercial lease cost." },
            { category: "InHouse", variable: "in_facility", display: "Facility Upgrades", value: 2500, unit: "$", tooltip: "Ventilation, plumbing, safety gear." },
            { category: "InHouse", variable: "in_equipment", display: "Screen Printer CapEx", value: 4816, unit: "$", tooltip: "Cost of printer, oven, and fridge." },
            { category: "InHouse", variable: "in_stencil", display: "Stencil Cost per Iteration", value: 109, unit: "$", tooltip: "Cost of new screens for each design change." },
            { category: "NOVA", variable: "nova_equipment", display: "NOVA Upfront CapEx", value: 46789, unit: "$", tooltip: "Machine, oven, fridge." },
            { category: "NOVA", variable: "nova_lead_time", display: "Lead Time per Iteration", value: 0.2, unit: "weeks", tooltip: "~1 business day for in-house printing." }
        ];

        const API_URL = "https://script.google.com/macros/s/AKfycbwq01hXUdTzOzU3Ck-2zy4-7Hj9_TzISmTnRIj1x8KoPacfP8yiA0-i-elJKFtQeX9K/exec";

        // --- COMPONENTS ---

        const Tooltip = ({ text }) => (
            <div className="group relative inline-flex items-center justify-center ml-2">
                <i className="fa-solid fa-circle-info text-slate-500 hover:text-slate-300 cursor-help transition-colors duration-200 text-sm"></i>
                <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-56 p-3 bg-surface-raised border border-slate-700 text-slate-200 text-xs rounded shadow-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none z-20 text-center font-normal tracking-wide">
                    {text}
                    <div className="absolute w-3 h-3 bg-surface-raised border-b border-r border-slate-700 transform rotate-45 left-1/2 -translate-x-1/2 -bottom-1.5"></div>
                </div>
            </div>
        );

        function App() {
            const [config, setConfig] = useState(DEFAULT_CONFIG);
            const [inputs, setInputs] = useState(DEFAULT_INPUTS);
            const [inputValues, setInputValues] = useState({});
            const [activeTab, setActiveTab] = useState('inputs');
            const [isLoading, setIsLoading] = useState(true);
            const [hasLogged, setHasLogged] = useState(false);

            // Fetch data from Google Sheet
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        // CRITICAL FIX: Append a timestamp to the URL to bust the browser cache.
                        // This forces the app to fetch the LIVE data from the sheet every time it loads.
                        const cacheBusterUrl = `${API_URL}?t=${new Date().getTime()}`;
                        const response = await fetch(cacheBusterUrl);
                        const data = await response.json();
                        
                        if (data.config && Object.keys(data.config).length > 0) {
                            setConfig(prev => ({...prev, ...data.config}));
                        }
                        if (data.inputs && data.inputs.length > 0) {
                            setInputs(data.inputs);
                        }
                    } catch (error) {
                        console.error("Failed to fetch from Google Sheets, using defaults.", error);
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchData();
            }, []);

            // Initialize input values state
            useEffect(() => {
                const initialValues = {};
                inputs.forEach(inp => {
                    initialValues[inp.variable] = parseFloat(inp.value) || 0;
                });
                setInputValues(initialValues);
            }, [inputs]);

            const handleInputChange = (variable, value) => {
                setInputValues(prev => ({
                    ...prev,
                    [variable]: parseFloat(value) || 0
                }));
            };

            // --- CALCULATIONS ---
            const calc = useMemo(() => {
                const v = (key) => inputValues[key] || 0;
                
                const iterations = v('iterations_per_cycle');
                const labor = v('labor_rate');
                
                // Outsourced
                const outsource_nre = 500; // Assumed fixed NRE
                const outsource_iter_cost = v('out_tooling') + v('out_material') + labor; // Simplified labor
                const outsource_cycle_cost = (outsource_iter_cost * iterations) + outsource_nre;
                const outsource_capex = 0;

                // In-House Partial
                const inhouse_facility_capex = v('in_facility') + (v('in_space') * v('in_space_cost'));
                const inhouse_capex = v('in_equipment') + inhouse_facility_capex;
                const inhouse_iter_cost = v('in_stencil') + 20 + labor; // $20 mat assumption
                const inhouse_cycle_cost = inhouse_iter_cost * iterations;

                // NOVA
                const nova_capex = v('nova_equipment');
                const nova_iter_cost = 10 + (labor * 0.5); // $10 mat, half labor time
                const nova_cycle_cost = nova_iter_cost * iterations;

                // Break Evens
                const be_outsource_cycles = (nova_capex - outsource_capex) / Math.max((outsource_cycle_cost - nova_cycle_cost), 1);
                const be_inhouse_cycles = (nova_capex - inhouse_capex) / Math.max((inhouse_cycle_cost - nova_cycle_cost), 1);

                // Payback
                const payback_months = (be_outsource_cycles / Math.max(v('cycles_per_year'), 1)) * 12;

                // Time to Market
                const weeks_saved = (v('out_lead_time') - v('nova_lead_time')) * iterations;
                const added_revenue = (weeks_saved / 4.33) * v('expected_revenue');

                return {
                    outsource_cycle_cost, outsource_capex,
                    inhouse_cycle_cost, inhouse_capex, inhouse_facility_capex,
                    nova_cycle_cost, nova_capex,
                    be_outsource_cycles, be_inhouse_cycles,
                    payback_months, weeks_saved, added_revenue
                };
            }, [inputValues]);

            // --- LOGGING ---
            useEffect(() => {
                if (activeTab === 'roi' && !hasLogged && !isLoading) {
                    setHasLogged(true);
                    try {
                        fetch(API_URL, {
                            method: 'POST',
                            mode: 'no-cors', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                session_id: "Sales_App_" + Math.floor(Math.random()*10000),
                                outsource_cost: calc.outsource_cycle_cost,
                                inhouse_cost: calc.inhouse_cycle_cost,
                                nova_cost: calc.nova_cycle_cost,
                                payback_months: calc.payback_months
                            })
                        });
                    } catch(e) { console.error("Logging failed", e); }
                }
            }, [activeTab, hasLogged, isLoading, calc]);


            // --- RENDER HELPERS ---
            const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);
            const formatNumber = (val) => new Intl.NumberFormat('en-US', { maximumFractionDigits: 1 }).format(val);

            // --- UI COMPONENTS ---
            const renderInputs = () => {
                const categories = ["Global", "Outsourced", "InHouse", "NOVA"];
                
                return (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 animate-fade-in">
                        {categories.map(cat => {
                            const catInputs = inputs.filter(i => i.category === cat);
                            if (catInputs.length === 0) return null;
                            
                            // Dynamic Title & Icon Fetching from Config
                            const titleKey = `Cat_${cat}_Title`;
                            const iconKey = `Cat_${cat}_Icon`;
                            
                            const displayTitle = config[titleKey] || `${cat} Parameters`;
                            const iconClass = config[iconKey];
                            
                            return (
                                <div key={cat} className="bg-surface-panel rounded-lg shadow-lg border border-slate-700/50 overflow-hidden transition-all duration-300 ease-in-out hover:border-slate-600">
                                    <div className="bg-surface-raised/50 px-5 py-3 border-b border-slate-700/50 font-semibold text-slate-200 flex items-center">
                                        {iconClass && iconClass.trim() !== "" ? (
                                            <i className={`fa-solid ${iconClass} mr-2 ${cat === 'NOVA' ? 'text-primary-500' : 'text-slate-400'}`}></i>
                                        ) : null}
                                        {displayTitle}
                                    </div>
                                    <div className="p-5 space-y-4">
                                        {catInputs.map(inp => (
                                            <div key={inp.variable} className="flex flex-col">
                                                <label className="text-sm font-medium text-slate-300 flex items-center mb-1.5">
                                                    {inp.display}
                                                    {inp.tooltip && <Tooltip text={inp.tooltip} />}
                                                </label>
                                                <div className="relative rounded shadow-sm">
                                                    <input 
                                                        type="number" 
                                                        value={inputValues[inp.variable] || ''}
                                                        onChange={(e) => handleInputChange(inp.variable, e.target.value)}
                                                        className="form-input block w-full rounded border border-slate-700 bg-surface-base text-white focus:border-primary-500 focus:ring-1 focus:ring-primary-500 sm:text-sm px-3 py-2 outline-none transition-shadow duration-200"
                                                    />
                                                    <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                                        <span className="text-slate-500 sm:text-sm">{inp.unit}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };

            const ChartComponent = ({ calc }) => {
                const chartRef = useRef(null);
                const chartInstance = useRef(null);

                useEffect(() => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    const ctx = chartRef.current.getContext('2d');
                    
                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['Outsourced CM', 'Partial In-House', 'NOVA'],
                            datasets: [
                                {
                                    label: 'Cycle Cost (OpEx)',
                                    data: [calc.outsource_cycle_cost, calc.inhouse_cycle_cost, calc.nova_cycle_cost],
                                    backgroundColor: ['#475569', '#64748b', '#3b82f6'], 
                                    borderRadius: 4,
                                },
                                {
                                    label: 'Equipment (CapEx)',
                                    data: [calc.outsource_capex, calc.inhouse_capex - calc.inhouse_facility_capex, calc.nova_capex],
                                    backgroundColor: ['#1e293b', '#334155', '#1e3a8a'], 
                                    borderRadius: 4,
                                },
                                {
                                    label: 'Facility Upgrades (CapEx)',
                                    data: [0, calc.inhouse_facility_capex, 0],
                                    backgroundColor: ['#0f172a', '#1e293b', '#172554'], 
                                    borderRadius: 4,
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                x: { 
                                    stacked: true, 
                                    grid: { display: false },
                                    ticks: { color: '#cbd5e1', font: { family: 'Inter' } } 
                                },
                                y: { 
                                    stacked: true, 
                                    border: { display: false },
                                    grid: { color: '#334155' }, 
                                    ticks: { 
                                        color: '#94a3b8', 
                                        font: { family: 'Inter' },
                                        callback: (value) => '$' + value.toLocaleString() 
                                    }
                                }
                            },
                            plugins: {
                                legend: { 
                                    position: 'bottom', 
                                    labels: { color: '#e2e8f0', usePointStyle: true, boxWidth: 8, font: { family: 'Inter' } } 
                                },
                                tooltip: {
                                    backgroundColor: '#1A1D24',
                                    titleColor: '#f8fafc',
                                    bodyColor: '#cbd5e1',
                                    borderColor: '#334155',
                                    borderWidth: 1,
                                    padding: 12,
                                    callbacks: {
                                        label: (context) => context.dataset.label + ': ' + formatCurrency(context.raw)
                                    }
                                }
                            }
                        }
                    });

                    return () => { if (chartInstance.current) chartInstance.current.destroy(); }
                }, [calc]);

                return <div className="h-72 w-full"><canvas ref={chartRef}></canvas></div>;
            };

            const renderROI = () => {
                return (
                    <div className="p-6 space-y-6 animate-fade-in">
                        {/* Top Hero Metrics */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Payback Hero */}
                            <div className="bg-surface-panel rounded-lg shadow-lg border border-slate-700/50 p-6 flex flex-col justify-center items-center text-center relative overflow-hidden transition-transform duration-300 hover:-translate-y-1">
                                <div className="absolute top-0 left-0 w-full h-1 bg-primary-500"></div>
                                <h3 className="text-slate-400 font-medium text-sm uppercase tracking-wider mb-2">{config.Feature_Payback}</h3>
                                <div className="text-5xl font-bold text-white mb-2 tracking-tight">
                                    {formatNumber(calc.payback_months)} <span className="text-2xl text-slate-400 font-normal">months</span>
                                </div>
                                <p className="text-sm text-slate-500 max-w-xs">
                                    Based on {formatNumber(calc.be_outsource_cycles)} design cycles to break even against outsourcing.
                                </p>
                            </div>

                            {/* Value Hero */}
                            <div className="bg-gradient-to-br from-primary-900/40 to-surface-panel rounded-lg shadow-lg border border-primary-500/30 p-6 flex flex-col justify-center items-center text-center text-white relative overflow-hidden transition-transform duration-300 hover:-translate-y-1">
                                <i className="fa-solid fa-rocket text-3xl text-primary-400 mb-3 opacity-90"></i>
                                <h3 className="text-slate-300 font-medium text-sm uppercase tracking-wider mb-2">{config.Feature_Speed}</h3>
                                <div className="text-4xl font-bold text-status-success mb-2 drop-shadow-md tracking-tight">
                                    +{formatCurrency(calc.added_revenue)}
                                </div>
                                <p className="text-sm text-slate-400 max-w-xs">
                                    Generated by launching {formatNumber(calc.weeks_saved)} weeks earlier per design cycle.
                                </p>
                            </div>
                        </div>

                        {/* Chart Area */}
                        <div className="bg-surface-panel rounded-lg shadow-lg border border-slate-700/50 p-6">
                            <div className="flex justify-between items-end mb-6">
                                <div>
                                    <h3 className="text-lg font-semibold text-white">Cost Structure Comparison</h3>
                                    <p className="text-sm text-slate-400 mt-1">CapEx vs OpEx over a single {inputValues.iterations_per_cycle}-iteration cycle.</p>
                                </div>
                                <div className="text-right">
                                    <div className="text-xs text-slate-500 uppercase tracking-wide">NOVA Cycle Savings</div>
                                    <div className="text-xl font-bold text-primary-400">{formatCurrency(calc.outsource_cycle_cost - calc.nova_cycle_cost)}</div>
                                </div>
                            </div>
                            <ChartComponent calc={calc} />
                        </div>

                        {/* Sensitivity Matrix */}
                        <div className="bg-surface-panel rounded-lg shadow-lg border border-slate-700/50 overflow-hidden">
                            <div className="bg-surface-raised/50 px-6 py-4 border-b border-slate-700/50">
                                <h3 className="text-lg font-semibold text-white">Sensitivity Analysis: Break-Even Cycles</h3>
                                <p className="text-sm text-slate-400 mt-1">How many cycles to pay off NOVA if assumptions change?</p>
                            </div>
                            <div className="overflow-x-auto p-6">
                                <table className="w-full text-sm text-left border-collapse">
                                    <thead>
                                        <tr>
                                            <th className="pb-3 text-slate-400 font-medium">Outsource Iteration Cost &rarr;<br/>Iterations per Cycle &darr;</th>
                                            <th className="pb-3 text-slate-300 font-semibold text-center border-b-2 border-slate-600">$100 / iter</th>
                                            <th className="pb-3 text-slate-300 font-semibold text-center border-b-2 border-slate-600">$250 / iter</th>
                                            <th className="pb-3 text-primary-400 font-semibold text-center border-b-2 border-primary-500 bg-primary-900/10 rounded-t-md">Current (~${Math.round((calc.outsource_cycle_cost-500)/inputValues.iterations_per_cycle)})</th>
                                            <th className="pb-3 text-slate-300 font-semibold text-center border-b-2 border-slate-600">$500 / iter</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {[3, 5, 10, 15].map((iters, idx) => (
                                            <tr key={iters} className="border-b border-slate-700/50 last:border-0 hover:bg-surface-raised transition-colors duration-150">
                                                <td className="py-3 font-medium text-slate-300">{iters} iterations</td>
                                                {[100, 250, (calc.outsource_cycle_cost-500)/inputValues.iterations_per_cycle, 500].map((cost, i) => {
                                                    const outCost = (cost * iters) + 500; 
                                                    const novCost = 15 * iters; // fixed assumption
                                                    const be = calc.nova_capex / Math.max(outCost - novCost, 1);
                                                    const isCurrent = i === 2;
                                                    return (
                                                        <td key={i} className={`py-3 text-center ${isCurrent ? 'bg-primary-900/10 font-bold text-primary-400' : 'text-slate-400'}`}>
                                                            {formatNumber(be)} cycles
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            if (isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="flex flex-col items-center space-y-4">
                            <i className="fa-solid fa-circle-notch fa-spin text-4xl text-primary-500"></i>
                            <p className="text-slate-400 font-medium">Loading parameters...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
                    {/* Header */}
                    <div className="mb-8 text-center md:text-left flex flex-col md:flex-row md:justify-between md:items-end">
                        <div>
                            <h1 className="text-3xl font-bold text-white tracking-tight">{config.App_Title}</h1>
                            <p className="mt-2 text-slate-400">{config.App_Subtitle}</p>
                        </div>
                        <div className="mt-6 md:mt-0">
                            {/* Inverted image to show white logo on dark background */}
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/Voltera_Logo.png" alt="Voltera Logo" className="h-7 opacity-70 invert" onError={(e) => e.target.style.display='none'} />
                        </div>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="border-b border-slate-700/70 mb-6">
                        <nav className="-mb-px flex space-x-8" aria-label="Tabs">
                            <button
                                onClick={() => setActiveTab('inputs')}
                                className={`${activeTab === 'inputs' ? 'border-primary-500 text-primary-400' : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-500'} whitespace-nowrap py-4 px-2 border-b-2 font-medium text-sm flex items-center transition-all duration-300 ease-in-out`}
                            >
                                <i className="fa-solid fa-sliders mr-2"></i>
                                {config.Tab1_Name}
                            </button>
                            <button
                                onClick={() => setActiveTab('roi')}
                                className={`${activeTab === 'roi' ? 'border-primary-500 text-primary-400' : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-500'} whitespace-nowrap py-4 px-2 border-b-2 font-medium text-sm flex items-center transition-all duration-300 ease-in-out`}
                            >
                                <i className="fa-solid fa-chart-line mr-2"></i>
                                {config.Tab2_Name}
                            </button>
                        </nav>
                    </div>

                    {/* Main Content Area */}
                    <main className="min-h-[600px]">
                        {activeTab === 'inputs' ? renderInputs() : renderROI()}
                    </main>
                    
                    <footer className="mt-12 text-center text-sm text-slate-500 pb-8">
                        &copy; {new Date().getFullYear()} Voltera. Internal Sales Tool.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        /* Custom Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        /* Subtle Carbon Fibre SVG background Pattern */
        .bg-carbon {
